; Example inventory showing a larger, generated fleet (e.g. VM pool created
; with Multipass, Vagrant, or a cloud provider's bulk instance API). Useful
; for exercising the LinuxVitals dashboard's search/filter UI against a
; realistic host count. Addresses use the RFC 5737 TEST-NET-1 documentation
; range (192.0.2.0/24) as placeholders.

[linux_servers]
vitals-node-01 ansible_host=192.0.2.101
vitals-node-02 ansible_host=192.0.2.102
vitals-node-03 ansible_host=192.0.2.103
vitals-node-04 ansible_host=192.0.2.104
vitals-node-05 ansible_host=192.0.2.105
vitals-node-06 ansible_host=192.0.2.106
vitals-node-07 ansible_host=192.0.2.107
vitals-node-08 ansible_host=192.0.2.108
vitals-node-09 ansible_host=192.0.2.109
vitals-node-10 ansible_host=192.0.2.110

[linux_servers:vars]
ansible_user=ubuntu
ansible_become=true
ansible_become_method=sudo
ansible_ssh_private_key_file=~/.ssh/id_rsa
