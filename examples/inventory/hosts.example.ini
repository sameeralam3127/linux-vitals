; Example inventory for LinuxVitals.
;
; Copy this file, update the hostnames/addresses for your fleet, and pass it
; with -i, e.g.:
;   ansible-playbook -i inventory/hosts.ini sameeralam3127.linux_vitals.healthcheck
;
; Addresses below use the RFC 5737 TEST-NET-1 documentation range
; (192.0.2.0/24) as placeholders -- replace them with real hosts.

[linux_servers]
rhel01 ansible_host=192.0.2.10
ubuntu01 ansible_host=192.0.2.11
fedora01 ansible_host=192.0.2.12
sles01 ansible_host=192.0.2.13

[linux_servers:vars]
ansible_user=automation
ansible_become=true
ansible_become_method=sudo
ansible_ssh_private_key_file=~/.ssh/id_rsa
