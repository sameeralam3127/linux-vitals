---
- name: Load controller-side configuration
  ansible.builtin.include_tasks:
    file: config.yml
    apply:
      tags:
        - always
        - config
  tags:
    - always
    - config

- name: Collect host discovery and extended system details
  ansible.builtin.include_tasks:
    file: discovery.yml
    apply:
      tags:
        - discovery
  tags:
    - discovery
    - kernel
    - security
    - boot

- name: Run self-healing checks
  ansible.builtin.include_tasks:
    file: self_healing.yml
    apply:
      tags:
        - self_healing
  tags:
    - self_healing

- name: Build host health result
  ansible.builtin.include_tasks:
    file: result.yml
    apply:
      tags:
        - result
        - reporting
  tags:
    - result
    - reporting

- name: Build reports and notifications
  ansible.builtin.include_tasks:
    file: reporting.yml
    apply:
      tags:
        - reporting
  tags:
    - reporting
    - notifications
