---
- name: Refresh platform facts for health evaluation
  ansible.builtin.setup:
    gather_subset:
      - min
      - hardware
      - network
      - virtual

- name: Collect service facts
  ansible.builtin.service_facts:

- name: Load Slack webhook from local .env when present
  ansible.builtin.set_fact:
    smart_os_health_check_dotenv_slack_webhook_url: >-
      {{
        (
          lookup('ansible.builtin.file', playbook_dir ~ '/.env', errors='ignore')
          | regex_findall("(?m)^SLACK_WEBHOOK_URL=[\"']?([^\"'\\n#]+)[\"']?$")
          | first
        ) | default('', true) | trim
      }}

- name: Finalize effective Slack webhook configuration
  ansible.builtin.set_fact:
    smart_os_health_check_effective_slack_webhook_url: >-
      {{
        (
          smart_os_health_check_slack_webhook_url | default('', true) | trim
        ) if (
          smart_os_health_check_slack_webhook_url | default('', true) | trim | length > 0
        ) else smart_os_health_check_dotenv_slack_webhook_url
      }}

- name: Define distro-aware health check context
  ansible.builtin.set_fact:
    smart_os_health_check_service_names: "{{ ansible_facts.services.keys() | list }}"
    smart_os_health_check_pkg_manager: >-
      {{ 'apt' if ansible_facts['os_family'] == 'Debian' else
         'zypper' if ansible_facts['os_family'] == 'Suse' else
         'dnf' }}
    smart_os_health_check_log_source: >-
      {{ 'journald' if ansible_facts['service_mgr'] == 'systemd' else 'system logs' }}
    smart_os_health_check_time_sync_candidates:
      - chronyd.service
      - chronyd
      - ntpd.service
      - ntpd
      - ntp.service
      - ntp
    smart_os_health_check_required_services:
      - sssd.service
      - sssd
      - systemd-journald.service
      - systemd-journald

- name: Resolve time synchronization service
  ansible.builtin.set_fact:
    smart_os_health_check_time_sync_service: >-
      {{
        (
          smart_os_health_check_time_sync_candidates
          | intersect(smart_os_health_check_service_names)
          | first
        ) | default('absent', true)
      }}

- name: Collect recent systemd log errors
  ansible.builtin.command:
    argv:
      - journalctl
      - --since
      - "{{ smart_os_health_check_log_window }}"
      - --no-pager
      - --output=short-iso
  register: smart_os_health_check_journalctl
  changed_when: false
  failed_when: false
  when: ansible_facts['service_mgr'] == "systemd"

- name: Evaluate RAM and log health
  ansible.builtin.set_fact:
    smart_os_health_check_memory_total_mb: "{{ ansible_facts.memtotal_mb | float }}"
    smart_os_health_check_memory_available_mb: >-
      {{ ansible_facts.memavailable_mb | default(ansible_facts.memfree_mb, true) | float }}
    smart_os_health_check_memory_used_mb: >-
      {{
        (ansible_facts.memtotal_mb | float)
        - (ansible_facts.memavailable_mb | default(ansible_facts.memfree_mb, true) | float)
      }}
    smart_os_health_check_ram_used_pct: >-
      {{
        (
          (
            (ansible_facts.memtotal_mb | float)
            - (ansible_facts.memavailable_mb | default(ansible_facts.memfree_mb, true) | float)
          ) / (ansible_facts.memtotal_mb | float)
        ) * 100
        | round(1)
      }}
    smart_os_health_check_log_matches: >-
      {{
        (
          smart_os_health_check_journalctl.stdout
          | default('')
          | regex_findall('(?im)^.*(?:error|failed).*$')
        )
      }}

- name: Finalize log health facts
  ansible.builtin.set_fact:
    smart_os_health_check_log_errors: "{{ smart_os_health_check_log_matches | length }}"
    smart_os_health_check_log_excerpt: "{{ smart_os_health_check_log_matches[:5] }}"

- name: Classify RAM status
  ansible.builtin.set_fact:
    smart_os_health_check_ram_status: >-
      {% if smart_os_health_check_ram_used_pct | float >= smart_os_health_check_ram_critical_threshold | float %}
      Critical
      {% elif smart_os_health_check_ram_used_pct | float >= smart_os_health_check_ram_warning_threshold | float %}
      Warning
      {% else %}
      OK
      {% endif %}

- name: Build required service status map
  ansible.builtin.set_fact:
    smart_os_health_check_service_status:
      sssd:
        service_name: >-
          {{
            (
              ['sssd.service', 'sssd']
              | intersect(smart_os_health_check_service_names)
              | first
            ) | default('absent', true)
          }}
        state: >-
          {{
            ansible_facts.services.get(
              (
                ['sssd.service', 'sssd']
                | intersect(smart_os_health_check_service_names)
                | first
              ) | default('absent', true),
              {}
            ).state | default('missing')
          }}
      systemd_journald:
        service_name: >-
          {{
            (
              ['systemd-journald.service', 'systemd-journald']
              | intersect(smart_os_health_check_service_names)
              | first
            ) | default('absent', true)
          }}
        state: >-
          {{
            ansible_facts.services.get(
              (
                ['systemd-journald.service', 'systemd-journald']
                | intersect(smart_os_health_check_service_names)
                | first
              ) | default('absent', true),
              {}
            ).state | default('missing')
          }}
      time_sync:
        service_name: "{{ smart_os_health_check_time_sync_service }}"
        state: >-
          {{
            ansible_facts.services.get(
              smart_os_health_check_time_sync_service,
              {}
            ).state | default('missing')
          }}

- name: Identify enabled failed services
  ansible.builtin.set_fact:
    smart_os_health_check_failed_enabled_services: >-
      {{
        ansible_facts.services
        | dict2items
        | selectattr('value.state', 'equalto', 'failed')
        | selectattr('value.status', 'defined')
        | selectattr('value.status', 'search', 'enabled')
        | map(attribute='key')
        | list
      }}

- name: Attempt one restart for enabled failed services
  ansible.builtin.service:
    name: "{{ item | regex_replace('\\.service$', '') }}"
    state: restarted
  loop: "{{ smart_os_health_check_failed_enabled_services }}"
  register: smart_os_health_check_restart_attempts
  failed_when: false
  when: smart_os_health_check_failed_enabled_services | length > 0

- name: Refresh service facts after self-healing attempts
  ansible.builtin.service_facts:
  when: smart_os_health_check_failed_enabled_services | length > 0

- name: Summarize self-healing outcomes
  ansible.builtin.set_fact:
    smart_os_health_check_healing_results: >-
      {%- set outcomes = [] -%}
      {%- for attempt in smart_os_health_check_restart_attempts.results | default([]) -%}
      {%- set key = attempt.item -%}
      {%- set current = ansible_facts.services.get(key, ansible_facts.services.get(key | regex_replace('\.service$', ''), {})) -%}
      {%- set result = 'Manual Intervention Required' -%}
      {%- if attempt.failed | default(false) -%}
      {%- set result = 'Manual Intervention Required' -%}
      {%- elif current.state | default('unknown') == 'running' -%}
      {%- set result = 'Fixed' -%}
      {%- elif current.state | default('unknown') == 'failed' -%}
      {%- set result = 'Failed to Fix' -%}
      {%- else -%}
      {%- set result = 'Manual Intervention Required' -%}
      {%- endif -%}
      {%- set _ = outcomes.append({'service': key, 'result': result}) -%}
      {%- endfor -%}
      {{ outcomes }}

- name: Finalize healing counters
  ansible.builtin.set_fact:
    smart_os_health_check_services_healed: >-
      {{
        smart_os_health_check_healing_results
        | selectattr('result', 'equalto', 'Fixed')
        | map(attribute='service')
        | list
      }}
    smart_os_health_check_auto_fixed_count: >-
      {{
        smart_os_health_check_healing_results
        | selectattr('result', 'equalto', 'Fixed')
        | list
        | length
      }}

- name: Refresh required service status after healing
  ansible.builtin.set_fact:
    smart_os_health_check_service_status:
      sssd:
        service_name: >-
          {{
            (
              ['sssd.service', 'sssd']
              | intersect(ansible_facts.services.keys() | list)
              | first
            ) | default('absent', true)
          }}
        state: >-
          {{
            ansible_facts.services.get(
              (
                ['sssd.service', 'sssd']
                | intersect(ansible_facts.services.keys() | list)
                | first
              ) | default('absent', true),
              {}
            ).state | default('missing')
          }}
      systemd_journald:
        service_name: >-
          {{
            (
              ['systemd-journald.service', 'systemd-journald']
              | intersect(ansible_facts.services.keys() | list)
              | first
            ) | default('absent', true)
          }}
        state: >-
          {{
            ansible_facts.services.get(
              (
                ['systemd-journald.service', 'systemd-journald']
                | intersect(ansible_facts.services.keys() | list)
                | first
              ) | default('absent', true),
              {}
            ).state | default('missing')
          }}
      time_sync:
        service_name: "{{ smart_os_health_check_time_sync_service }}"
        state: >-
          {{
            ansible_facts.services.get(
              smart_os_health_check_time_sync_service,
              {}
            ).state | default('missing')
          }}

- name: Build host health findings
  ansible.builtin.set_fact:
    smart_os_health_check_findings: >-
      {%- set findings = [] -%}
      {%- if smart_os_health_check_ram_status == 'Critical' -%}
      {%- set _ = findings.append('RAM usage is critical') -%}
      {%- endif -%}
      {%- if smart_os_health_check_log_errors | int > 0 -%}
      {%- set _ = findings.append('Recent logs contain error or failed entries') -%}
      {%- endif -%}
      {%- if smart_os_health_check_service_status.sssd.state != 'running' -%}
      {%- set _ = findings.append('sssd is not active') -%}
      {%- endif -%}
      {%- if smart_os_health_check_service_status.systemd_journald.state != 'running' -%}
      {%- set _ = findings.append('systemd-journald is not active') -%}
      {%- endif -%}
      {%- if smart_os_health_check_service_status.time_sync.service_name == 'absent' -%}
      {%- set _ = findings.append('chronyd or ntp is not installed') -%}
      {%- elif smart_os_health_check_service_status.time_sync.state != 'running' -%}
      {%- set _ = findings.append('Time synchronization service is not active') -%}
      {%- endif -%}
      {%- for item in smart_os_health_check_healing_results | default([]) -%}
      {%- if item.result != 'Fixed' -%}
      {%- set _ = findings.append(item.service ~ ' requires manual follow-up') -%}
      {%- endif -%}
      {%- endfor -%}
      {{ findings }}

- name: Build per-host report object
  ansible.builtin.set_fact:
    smart_os_health_check_result:
      hostname: "{{ ansible_facts.hostname | default(inventory_hostname) }}"
      os: "{{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}"
      os_family: "{{ ansible_facts['os_family'] }}"
      package_manager: "{{ smart_os_health_check_pkg_manager }}"
      log_source: "{{ smart_os_health_check_log_source }}"
      ram_status: "{{ smart_os_health_check_ram_status }}"
      ram_used_pct: "{{ smart_os_health_check_ram_used_pct }}"
      ram_used_mb: "{{ smart_os_health_check_memory_used_mb | round(1) }}"
      ram_total_mb: "{{ smart_os_health_check_memory_total_mb | round(1) }}"
      log_errors: "{{ smart_os_health_check_log_errors }}"
      log_excerpt: "{{ smart_os_health_check_log_excerpt }}"
      services_healed: "{{ smart_os_health_check_services_healed }}"
      healing_results: "{{ smart_os_health_check_healing_results }}"
      final_status: "{{ 'Pass' if smart_os_health_check_findings | length == 0 else 'Fail' }}"
      findings: "{{ smart_os_health_check_findings }}"

- name: Ensure reports directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/reports"
    state: directory
    mode: "0755"
  delegate_to: localhost
  run_once: true

- name: Build consolidated maintenance summary
  ansible.builtin.set_fact:
    smart_os_health_check_summary:
      servers_checked: "{{ ansible_play_hosts_all | length }}"
      auto_fixed_count: >-
        {{
          ansible_play_hosts_all
          | map('extract', hostvars, 'smart_os_health_check_auto_fixed_count')
          | map('default', 0)
          | map('int')
          | sum
        }}
      critical_error_count: >-
        {{
          ansible_play_hosts_all
          | map('extract', hostvars, 'smart_os_health_check_result')
          | selectattr('final_status', 'equalto', 'Fail')
          | list
          | length
        }}
      snippet: >-
        {{
          (
            ansible_play_hosts_all | length | string
          ) ~ ' Servers Checked, '
          ~ (
            ansible_play_hosts_all
            | map('extract', hostvars, 'smart_os_health_check_auto_fixed_count')
            | map('default', 0)
            | map('int')
            | sum
            | string
          ) ~ ' Auto-Fixed, '
          ~ (
            ansible_play_hosts_all
            | map('extract', hostvars, 'smart_os_health_check_result')
            | selectattr('final_status', 'equalto', 'Fail')
            | list
            | length
            | string
          ) ~ ' Critical Error'
        }}
  delegate_to: localhost
  run_once: true

- name: Generate consolidated HTML dashboard
  ansible.builtin.template:
    src: report.html.j2
    dest: "{{ smart_os_health_check_output_path }}"
    mode: "0644"
  delegate_to: localhost
  run_once: true

- name: Send Slack maintenance summary
  ansible.builtin.uri:
    url: "{{ smart_os_health_check_effective_slack_webhook_url }}"
    method: POST
    body_format: json
    body:
      text: "{{ lookup('ansible.builtin.template', 'slack_message.txt.j2') }}"
    status_code: 200
    return_content: true
  delegate_to: localhost
  run_once: true
  when: smart_os_health_check_effective_slack_webhook_url | length > 0
