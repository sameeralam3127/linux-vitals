---
- name: Load controller-side configuration
  ansible.builtin.include_tasks:
    file: config.yml
    apply:
      tags:
        - always
        - config
  tags:
    - always
    - config

- name: Persist a snapshot of this run for baseline/postcheck comparison
  ansible.builtin.include_tasks:
    file: snapshot.yml
    apply:
      tags:
        - reporting
  tags:
    - reporting

- name: Compare this run against a prior baseline snapshot
  ansible.builtin.include_tasks:
    file: compare.yml
    apply:
      tags:
        - reporting
  tags:
    - reporting

- name: Build reports
  ansible.builtin.include_tasks:
    file: render.yml
    apply:
      tags:
        - reporting
  tags:
    - reporting

- name: Send notifications
  ansible.builtin.include_tasks:
    file: notify.yml
    apply:
      tags:
        - reporting
  tags:
    - reporting
    - notifications
