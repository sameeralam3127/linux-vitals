---
- name: Refresh platform facts for health evaluation
  ansible.builtin.setup:
    gather_subset:
      - min
      - hardware
      - network
      - virtual
  tags:
    - discovery

- name: Collect service facts
  ansible.builtin.service_facts:
  tags:
    - discovery

- name: Define distro-aware health check context
  ansible.builtin.set_fact:
    linux_vitals_service_names: "{{ ansible_facts.services.keys() | list }}"
    linux_vitals_pkg_manager: >-
      {{ 'apt' if ansible_facts['os_family'] == 'Debian' else
         'zypper' if ansible_facts['os_family'] == 'Suse' else
         'dnf' }}
    linux_vitals_log_source: >-
      {{ 'journald' if ansible_facts['service_mgr'] == 'systemd' else 'system logs' }}
    linux_vitals_time_sync_candidates:
      - chronyd.service
      - chronyd
      - chrony.service
      - chrony
      - ntpd.service
      - ntpd
      - ntp.service
      - ntp
      - systemd-timesyncd.service
      - systemd-timesyncd
  tags:
    - discovery

- name: Resolve time synchronization service
  ansible.builtin.set_fact:
    linux_vitals_time_sync_service: >-
      {{
        (
          linux_vitals_time_sync_candidates
          | select('in', linux_vitals_service_names) | list
          | first
        ) | default('absent', true)
      }}
  tags:
    - discovery

- name: Collect recent systemd log errors
  ansible.builtin.command:
    argv:
      - journalctl
      - --since
      - "{{ linux_vitals_log_window }}"
      - --no-pager
      - --output=short-iso
  register: linux_vitals_journalctl
  changed_when: false
  failed_when: false
  when: ansible_facts['service_mgr'] == "systemd"
  tags:
    - discovery

- name: Collect recent failed login attempts
  ansible.builtin.command:
    argv:
      - sh
      - -c
      - "lastb -n 5 2>/dev/null"
  register: linux_vitals_failed_login_attempts_cmd
  changed_when: false
  failed_when: false
  tags:
    - discovery
    - security

- name: Collect last reboot information
  ansible.builtin.command:
    argv:
      - who
      - -b
  register: linux_vitals_last_reboot_cmd
  changed_when: false
  failed_when: false
  tags:
    - discovery
    - boot

- name: Collect latest installed kernel version
  ansible.builtin.command:
    argv:
      - sh
      - -c
      - "ls -1 /lib/modules 2>/dev/null | sort -V | tail -n 1"
  register: linux_vitals_latest_kernel_cmd
  changed_when: false
  failed_when: false
  tags:
    - discovery
    - kernel

- name: Collect latest installed kernel timestamp
  ansible.builtin.command:
    argv:
      - sh
      - -c
      - "latest=$(ls -1 /lib/modules 2>/dev/null | sort -V | tail -n 1); test -n \"$latest\" && stat -c '%y' \"/lib/modules/$latest\""
  register: linux_vitals_latest_kernel_timestamp_cmd
  changed_when: false
  failed_when: false
  tags:
    - discovery
    - kernel

- name: Collect bootloader default kernel information
  ansible.builtin.command:
    argv:
      - sh
      - -c
      - |
          sanitize_kernel() {
            kernel_value="$1"
            kernel_value="${kernel_value##*/}"
            kernel_value="${kernel_value#vmlinuz-}"
            kernel_value="${kernel_value#linux-}"
            printf '%s' "$kernel_value"
          }

          # Portable POSIX sh state machine (no gawk-only 3-arg match()) so this
          # works under mawk/dash/BusyBox targets, not just gawk-equipped hosts.
          resolve_kernel_from_grubcfg() {
            entry_name="$1"
            config_path="$2"
            [ -n "$entry_name" ] || return 0
            [ -f "$config_path" ] || return 0
            in_entry=0
            while IFS= read -r line; do
              case "$line" in
                menuentry\ *)
                  in_entry=0
                  rest="${line#menuentry }"
                  case "$rest" in
                    \'*)
                      title="${rest#\'}"
                      title="${title%%\'*}"
                      ;;
                    \"*)
                      title="${rest#\"}"
                      title="${title%%\"*}"
                      ;;
                    *)
                      title=""
                      ;;
                  esac
                  if [ "$title" = "$entry_name" ]; then
                    in_entry=1
                  fi
                  ;;
                *)
                  if [ "$in_entry" -eq 1 ]; then
                    set -f
                    set -- $line
                    set +f
                    if [ "$1" = "linux" ] || [ "$1" = "linuxefi" ] || [ "$1" = "linux16" ]; then
                      printf '%s\n' "$2"
                      return 0
                    fi
                  fi
                  ;;
              esac
            done < "$config_path"
          }

          resolve_kernel_from_grubcfg_by_index() {
            target_index="$1"
            config_path="$2"
            [ -f "$config_path" ] || return 0
            current_index=-1
            in_entry=0
            while IFS= read -r line; do
              case "$line" in
                menuentry\ *)
                  current_index=$((current_index + 1))
                  in_entry=0
                  if [ "$current_index" -eq "$target_index" ]; then
                    in_entry=1
                  fi
                  ;;
                *)
                  if [ "$in_entry" -eq 1 ]; then
                    set -f
                    set -- $line
                    set +f
                    if [ "$1" = "linux" ] || [ "$1" = "linuxefi" ] || [ "$1" = "linux16" ]; then
                      printf '%s\n' "$2"
                      return 0
                    fi
                  fi
                  ;;
              esac
            done < "$config_path"
          }

          print_result() {
            printf 'supported=%s\n' "$1"
            printf 'source=%s\n' "$2"
            printf 'default_entry=%s\n' "$3"
            printf 'default_kernel=%s\n' "$4"
            printf 'status=%s\n' "$5"
          }

          grub_cfg=""
          for candidate in /boot/grub2/grub.cfg /boot/grub/grub.cfg /boot/efi/EFI/*/grub.cfg /efi/EFI/*/grub.cfg; do
            if [ -f "$candidate" ]; then
              grub_cfg="$candidate"
              break
            fi
          done

          if command -v grubby >/dev/null 2>&1; then
            default_kernel_path="$(grubby --default-kernel 2>/dev/null || true)"
            if [ -n "$default_kernel_path" ]; then
              print_result "true" "grubby" "$default_kernel_path" "$(sanitize_kernel "$default_kernel_path")" "resolved"
              exit 0
            fi
          fi

          grub_editenv_cmd=""
          for candidate_cmd in grub2-editenv grub-editenv; do
            if command -v "$candidate_cmd" >/dev/null 2>&1; then
              grub_editenv_cmd="$candidate_cmd"
              break
            fi
          done

          grub_env=""
          for candidate in /boot/grub2/grubenv /boot/grub/grubenv /boot/efi/EFI/*/grubenv /efi/EFI/*/grubenv; do
            if [ -f "$candidate" ]; then
              grub_env="$candidate"
              break
            fi
          done

          if [ -n "$grub_editenv_cmd" ] && [ -n "$grub_env" ]; then
            saved_entry="$("$grub_editenv_cmd" "$grub_env" list 2>/dev/null | sed -n 's/^saved_entry=//p' | head -n 1)"
            if [ -n "$saved_entry" ]; then
              resolved_kernel=""
              case "$saved_entry" in
                *vmlinuz*|*linux*)
                  resolved_kernel="$(sanitize_kernel "$saved_entry")"
                  ;;
                *)
                  if [ -n "$grub_cfg" ]; then
                    resolved_path="$(resolve_kernel_from_grubcfg "$saved_entry" "$grub_cfg")"
                    if [ -n "$resolved_path" ]; then
                      resolved_kernel="$(sanitize_kernel "$resolved_path")"
                    fi
                  fi
                  ;;
              esac
              result_status="entry-only"
              if [ -n "$resolved_kernel" ]; then
                result_status="resolved"
              fi
              print_result "true" "grubenv" "$saved_entry" "$resolved_kernel" "$result_status"
              exit 0
            fi
          fi

          if [ -f /etc/default/grub ]; then
            grub_default_raw="$(sed -n 's/^GRUB_DEFAULT=//p' /etc/default/grub | head -n 1 | tr -d '"' | tr -d "'")"
            if [ -n "$grub_default_raw" ] && [ "$grub_default_raw" != "saved" ]; then
              resolved_kernel=""
              case "$grub_default_raw" in
                ''|*[!0-9]*)
                  case "$grub_default_raw" in
                    *vmlinuz*|*linux*)
                      resolved_kernel="$(sanitize_kernel "$grub_default_raw")"
                      ;;
                    *)
                      if [ -n "$grub_cfg" ]; then
                        resolved_path="$(resolve_kernel_from_grubcfg "$grub_default_raw" "$grub_cfg")"
                        if [ -n "$resolved_path" ]; then
                          resolved_kernel="$(sanitize_kernel "$resolved_path")"
                        fi
                      fi
                      ;;
                  esac
                  ;;
                *)
                  if [ -n "$grub_cfg" ]; then
                    resolved_path="$(resolve_kernel_from_grubcfg_by_index "$grub_default_raw" "$grub_cfg")"
                    if [ -n "$resolved_path" ]; then
                      resolved_kernel="$(sanitize_kernel "$resolved_path")"
                    fi
                  fi
                  ;;
              esac
              result_status="entry-only"
              if [ -n "$resolved_kernel" ]; then
                result_status="resolved"
              fi
              print_result "true" "grub_default" "$grub_default_raw" "$resolved_kernel" "$result_status"
              exit 0
            fi
          fi

          print_result "false" "unavailable" "" "" "unavailable"
  register: linux_vitals_bootloader_default_cmd
  changed_when: false
  failed_when: false
  tags:
    - discovery
    - kernel

- name: Check if reboot is required on Debian family
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: linux_vitals_reboot_required_file
  when: ansible_facts['os_family'] == 'Debian'
  tags:
    - discovery
    - kernel

- name: Check if reboot is recommended on RedHat family
  ansible.builtin.command:
    argv:
      - needs-restarting
      - -r
  register: linux_vitals_needs_restarting_cmd
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == 'RedHat'
  tags:
    - discovery
    - kernel

- name: Check if reboot is recommended on SUSE family
  ansible.builtin.stat:
    path: /var/run/reboot-needed
  register: linux_vitals_suse_reboot_file
  when: ansible_facts['os_family'] == 'Suse'
  tags:
    - discovery
    - kernel

- name: Collect SELinux mode
  ansible.builtin.command:
    argv:
      - getenforce
  register: linux_vitals_selinux_cmd
  changed_when: false
  failed_when: false
  tags:
    - discovery
    - security

- name: Collect AppArmor status
  ansible.builtin.command:
    argv:
      - aa-status
      - --enabled
  register: linux_vitals_apparmor_cmd
  changed_when: false
  failed_when: false
  tags:
    - discovery
    - security

- name: Collect rescue image presence
  ansible.builtin.command:
    argv:
      - sh
      - -c
      - "find /boot -maxdepth 1 \\( -name '*rescue*' -o -name 'initramfs-*rescue*' \\) 2>/dev/null | head -n 5"
  register: linux_vitals_rescue_image_cmd
  changed_when: false
  failed_when: false
  tags:
    - discovery
    - boot

- name: Collect kernel install failures from logs
  ansible.builtin.command:
    argv:
      - journalctl
      - --since
      - "{{ linux_vitals_audit_log_window }}"
      - --no-pager
      - --output=short-iso
  register: linux_vitals_audit_journalctl
  changed_when: false
  failed_when: false
  when: ansible_facts['service_mgr'] == "systemd"
  tags:
    - discovery
    - kernel

- name: Evaluate base memory and log health
  ansible.builtin.set_fact:
    linux_vitals_memory_total_mb: "{{ ansible_facts.memtotal_mb | float }}"
    linux_vitals_memory_available_mb: >-
      {{ ansible_facts.memavailable_mb | default(ansible_facts.memfree_mb, true) | float }}
    linux_vitals_memory_used_mb: >-
      {{
        (ansible_facts.memtotal_mb | float)
        - (ansible_facts.memavailable_mb | default(ansible_facts.memfree_mb, true) | float)
      }}
    linux_vitals_ram_used_pct: >-
      {{
        (
          (
            (
              (ansible_facts.memtotal_mb | float)
              - (ansible_facts.memavailable_mb | default(ansible_facts.memfree_mb, true) | float)
            ) / (ansible_facts.memtotal_mb | float)
          ) * 100
        ) | round(1)
      }}
    linux_vitals_log_matches: >-
      {{
        (
          linux_vitals_journalctl.stdout
          | default('')
          | regex_findall('(?im)^.*(?:error|failed).*$')
        )
      }}
    linux_vitals_kernel_failure_matches: >-
      {{
        (
          linux_vitals_audit_journalctl.stdout
          | default('')
          | regex_findall('(?im)^.*(?:kernel|grub|dracut|initramfs).*(?:fail|error).*$')
        )
      }}
  tags:
    - discovery
    - kernel
    - security
    - boot

- name: Finalize extended discovery facts
  ansible.builtin.set_fact:
    linux_vitals_log_errors: "{{ linux_vitals_log_matches | length }}"
    linux_vitals_log_excerpt: "{{ linux_vitals_log_matches[:5] }}"
    linux_vitals_ram_status: >-
      {{
        'Critical'
        if linux_vitals_ram_used_pct | float
        >= linux_vitals_ram_critical_threshold | float
        else 'Warning'
        if linux_vitals_ram_used_pct | float
        >= linux_vitals_ram_warning_threshold | float
        else 'OK'
      }}
    linux_vitals_virtualization_type: "{{ ansible_facts['virtualization_type'] | default('unknown') }}"
    linux_vitals_platform_type: >-
      {{
        'Virtual Machine'
        if ansible_facts['virtualization_role'] | default('NA') == 'guest'
        else 'Physical'
        if ansible_facts['virtualization_type'] | default('') in ['NA', '', 'none']
        else 'Hypervisor'
      }}
    linux_vitals_uptime_seconds: "{{ ansible_facts['uptime_seconds'] | default(0) | int }}"
    linux_vitals_uptime_readable: >-
      {{
        (
          (ansible_facts['uptime_seconds'] | default(0) | int // 86400) | string
        ) ~ 'd '
        ~ (
          ((ansible_facts['uptime_seconds'] | default(0) | int % 86400) // 3600) | string
        ) ~ 'h '
        ~ (
          (((ansible_facts['uptime_seconds'] | default(0) | int % 3600) // 60)) | string
        ) ~ 'm'
      }}
    linux_vitals_running_kernel: "{{ ansible_facts['kernel'] | default('unknown') }}"
    linux_vitals_latest_installed_kernel: "{{ linux_vitals_latest_kernel_cmd.stdout | default('unknown') | trim }}"
    linux_vitals_latest_kernel_updated_at: "{{ linux_vitals_latest_kernel_timestamp_cmd.stdout | default('unknown') | trim }}"
    linux_vitals_latest_kernel_selected: >-
      {{
        (
          linux_vitals_latest_kernel_cmd.stdout | default('') | trim
        ) == (
          ansible_facts['kernel'] | default('') | trim
        )
      }}
    linux_vitals_bootloader_supported: >-
      {{
        (
          linux_vitals_bootloader_default_cmd.stdout
          | regex_findall('(?m)^supported=(.*)$')
          | first
          | default('false')
          | trim
        ) == 'true'
      }}
    linux_vitals_bootloader_default_source: >-
      {{
        linux_vitals_bootloader_default_cmd.stdout
        | regex_findall('(?m)^source=(.*)$')
        | first
        | default('unavailable')
        | trim
      }}
    linux_vitals_bootloader_default_entry: >-
      {{
        linux_vitals_bootloader_default_cmd.stdout
        | regex_findall('(?m)^default_entry=(.*)$')
        | first
        | default('')
        | trim
      }}
    linux_vitals_bootloader_default_kernel: >-
      {{
        linux_vitals_bootloader_default_cmd.stdout
        | regex_findall('(?m)^default_kernel=(.*)$')
        | first
        | default('')
        | trim
      }}
    linux_vitals_bootloader_default_status: >-
      {{
        linux_vitals_bootloader_default_cmd.stdout
        | regex_findall('(?m)^status=(.*)$')
        | first
        | default('unavailable')
        | trim
      }}
    linux_vitals_reboot_required: >-
      {{
        (
          linux_vitals_reboot_required_file.stat.exists | default(false)
        ) if ansible_facts['os_family'] == 'Debian'
        else (
          linux_vitals_needs_restarting_cmd.rc | default(1)
        ) == 1 if ansible_facts['os_family'] == 'RedHat'
        else (
          linux_vitals_suse_reboot_file.stat.exists | default(false)
        ) if ansible_facts['os_family'] == 'Suse'
        else not linux_vitals_latest_kernel_selected
      }}
    linux_vitals_selinux_status: "{{ linux_vitals_selinux_cmd.stdout | default('not-installed') | trim }}"
    linux_vitals_apparmor_status: >-
      {{
        'enabled'
        if linux_vitals_apparmor_cmd.rc | default(1) == 0
        else 'disabled'
      }}
    linux_vitals_failed_login_attempts: >-
      {{
        linux_vitals_failed_login_attempts_cmd.stdout_lines
        | default([])
        | reject('equalto', '')
        | reject('match', '^btmp begins ')
        | list
      }}
    linux_vitals_last_failed_login: >-
      {{
        (
          linux_vitals_failed_login_attempts_cmd.stdout_lines
          | default([])
          | reject('equalto', '')
          | reject('match', '^btmp begins ')
          | list
        ) | first | default('No failed login attempts found')
      }}
    linux_vitals_last_reboot: >-
      {{
        linux_vitals_last_reboot_cmd.stdout
        | default('Unknown')
        | regex_replace('^\\s*system boot\\s+', '')
        | trim
      }}
    linux_vitals_kernel_install_failures: "{{ linux_vitals_kernel_failure_matches | length }}"
    linux_vitals_kernel_install_failure_excerpt: "{{ linux_vitals_kernel_failure_matches[:5] }}"
    linux_vitals_rescue_image_available: >-
      {{
        linux_vitals_rescue_image_cmd.stdout | default('') | trim | length > 0
      }}
    linux_vitals_rescue_image_paths: "{{ linux_vitals_rescue_image_cmd.stdout_lines | default([]) }}"
  tags:
    - discovery
    - kernel
    - security
    - boot

- name: Finalize bootloader default-kernel match fact
  ansible.builtin.set_fact:
    linux_vitals_bootloader_default_matches_latest: >-
      {{
        linux_vitals_bootloader_default_status == 'resolved'
        and linux_vitals_bootloader_default_kernel == linux_vitals_latest_installed_kernel
      }}

- name: Finalize bootloader validation message
  ansible.builtin.set_fact:
    linux_vitals_bootloader_validation_message: >-
      {{
        'Default boot entry selects the latest installed kernel'
        if linux_vitals_bootloader_default_status == 'resolved'
        and linux_vitals_bootloader_default_matches_latest
        else 'Default boot entry does not select the latest installed kernel'
        if linux_vitals_bootloader_default_status == 'resolved'
        else 'Default boot entry detected but the kernel could not be resolved'
        if linux_vitals_bootloader_default_status == 'entry-only'
        else 'Bootloader default kernel validation is not available on this host'
      }}

- name: Build boot partition facts
  ansible.builtin.set_fact:
    linux_vitals_boot_mount: >-
      {{
        (
          ansible_facts['mounts']
          | selectattr('mount', 'equalto', '/boot')
          | list
          | first
        )
        | default(
          (
            ansible_facts['mounts']
            | selectattr('mount', 'equalto', '/boot/efi')
            | list
            | first
          ),
          true
        )
      }}
  tags:
    - discovery
    - boot

- name: Finalize boot space facts
  ansible.builtin.set_fact:
    linux_vitals_boot_mount_point: "{{ linux_vitals_boot_mount.mount | default('not-mounted') }}"
    linux_vitals_boot_free_mb: >-
      {{
        (linux_vitals_boot_mount.size_available | default(0) | float / 1048576)
        | round(1)
      }}
    linux_vitals_boot_total_mb: >-
      {{
        (linux_vitals_boot_mount.size_total | default(0) | float / 1048576)
        | round(1)
      }}
    linux_vitals_boot_free_pct: >-
      {{
        (
          (
            (
              linux_vitals_boot_mount.size_available | default(0) | float
            ) / (
              linux_vitals_boot_mount.size_total | default(1) | float
            )
          ) * 100
        ) | round(1)
      }}
    linux_vitals_boot_space_status: >-
      {{
        'Not Available'
        if linux_vitals_boot_mount.mount is not defined
        else 'Low'
        if (
          (
            (
              linux_vitals_boot_mount.size_available | default(0) | float
            ) / (
              linux_vitals_boot_mount.size_total | default(1) | float
            ) * 100
          ) | round(1)
        ) < linux_vitals_boot_warning_threshold | float
        else 'Healthy'
      }}
  tags:
    - discovery
    - boot

- name: Build required service status map
  ansible.builtin.set_fact:
    linux_vitals_service_status:
      sssd:
        service_name: >-
          {{
            (
              ['sssd.service', 'sssd']
              | select('in', linux_vitals_service_names) | list
              | first
            ) | default('absent', true)
          }}
        state: >-
          {{
            ansible_facts.services.get(
              (
                ['sssd.service', 'sssd']
                | select('in', linux_vitals_service_names) | list
                | first
              ) | default('absent', true),
              {}
            ).state | default('missing')
          }}
      systemd_journald:
        service_name: >-
          {{
            (
              ['systemd-journald.service', 'systemd-journald']
              | select('in', linux_vitals_service_names) | list
              | first
            ) | default('absent', true)
          }}
        state: >-
          {{
            ansible_facts.services.get(
              (
                ['systemd-journald.service', 'systemd-journald']
                | select('in', linux_vitals_service_names) | list
                | first
              ) | default('absent', true),
              {}
            ).state | default('missing')
          }}
      time_sync:
        service_name: "{{ linux_vitals_time_sync_service }}"
        state: >-
          {{
            ansible_facts.services.get(
              linux_vitals_time_sync_service,
              {}
            ).state | default('missing')
          }}
  tags:
    - discovery
