---
- name: Collect host discovery and extended system details
  ansible.builtin.include_tasks:
    file: discovery.yml
    apply:
      tags:
        - discovery
  tags:
    - discovery
    - kernel
    - security
    - boot

- name: Build host health result
  ansible.builtin.include_tasks:
    file: result.yml
    apply:
      tags:
        - result
  tags:
    - result
    - reporting
