---
- name: Exercise report archiving and retention
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    output_dir: "{{ lookup('ansible.builtin.env', 'TEST_OUTPUT_DIR') }}"
    latest_dir: "{{ output_dir }}/latest"
    archive_dir: "{{ output_dir }}/archive"
    linux_vitals_output_path: "{{ latest_dir }}/linux_vitals_report.html"
    linux_vitals_archive_html_reports: true
    linux_vitals_archive_json_reports: true
    linux_vitals_json_output_path: "{{ latest_dir }}/linux_vitals_report.json"
    linux_vitals_report_archive_dir: "{{ archive_dir }}"
    linux_vitals_report_retention_count: 2
    linux_vitals_archive_timestamp: "20260429T120000Z"
    linux_vitals_report_title: "LinuxVitals Test Dashboard"
    linux_vitals_effective_slack_webhook_url: ""
    linux_vitals_slack_message_header: "Standard Maintenance Summary"
    linux_vitals_slack_message_footer: "Generated by Ansible"
    linux_vitals_slack_include_host_breakdown: true
    linux_vitals_auto_fixed_count: 0
    fixture_linux_vitals_result:
      hostname: "localhost"
      ip_address: "127.0.0.1"
      os: "Ubuntu 24.04"
      os_family: "Debian"
      package_manager: "apt"
      log_source: "journald"
      platform_type: "Virtual Machine"
      virtualization_type: "docker"
      uptime: "1d 2h 3m"
      last_reboot: "2026-04-20 12:00"
      running_kernel: "6.8.0-test"
      latest_installed_kernel: "6.8.0-test"
      latest_kernel_updated_at: "2026-04-20 11:30"
      latest_kernel_selected: true
      bootloader_supported: true
      bootloader_default_source: "grubby"
      bootloader_default_entry: "/boot/vmlinuz-6.8.0-test"
      bootloader_default_kernel: "6.8.0-test"
      bootloader_default_status: "resolved"
      bootloader_default_matches_latest: true
      bootloader_validation_message: "Default boot entry selects the latest installed kernel"
      reboot_required: false
      selinux_status: "not-installed"
      apparmor_status: "enabled"
      boot_mount: "/boot"
      boot_free_mb: 512.0
      boot_total_mb: 1024.0
      boot_free_pct: 50.0
      boot_space_status: "Healthy"
      rescue_image_available: true
      rescue_image_paths:
        - "/boot/initramfs-rescue-test.img"
      last_failed_login: "No failed login attempts found"
      failed_login_count: 0
      kernel_install_failures: 0
      kernel_install_failure_excerpt: []
      ram_status: "OK"
      ram_used_pct: 43.2
      ram_used_mb: 3456.0
      ram_total_mb: 8192.0
      log_errors: 0
      log_excerpt: []
      asset_serial: "TEST-SERIAL-0001"
      services_healed: []
      healing_results: []
      final_status: "Pass"
      findings: []
  tasks:
    - name: Ensure latest and archive directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ latest_dir }}"
        - "{{ archive_dir }}"

    - name: Seed current JSON report fixture
      ansible.builtin.copy:
        dest: "{{ linux_vitals_json_output_path }}"
        content: |
          {
            "status": "ok"
          }
        mode: "0644"

    - name: Seed older archived HTML reports
      ansible.builtin.copy:
        dest: "{{ archive_dir }}/{{ item }}"
        content: "<html></html>"
        mode: "0644"
      loop:
        - "linux_vitals_report-20260426T120000Z.html"
        - "linux_vitals_report-20260427T120000Z.html"
        - "linux_vitals_report-20260428T120000Z.html"

    - name: Seed older archived JSON reports
      ansible.builtin.copy:
        dest: "{{ archive_dir }}/{{ item }}"
        content: |
          {
            "status": "old"
          }
        mode: "0644"
      loop:
        - "linux_vitals_report-20260426T120000Z.json"
        - "linux_vitals_report-20260427T120000Z.json"
        - "linux_vitals_report-20260428T120000Z.json"

    - name: Populate host-scoped health result fixture
      ansible.builtin.set_fact:
        linux_vitals_result: "{{ fixture_linux_vitals_result }}"

    - name: Build reports and archives
      ansible.builtin.include_role:
        name: sameeralam3127.linux_vitals.vitals_report
        tasks_from: render
