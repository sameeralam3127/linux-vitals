---
- name: Render dashboard and Slack templates with representative data
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    output_dir: "{{ lookup('ansible.builtin.env', 'TEST_OUTPUT_DIR') }}"
    smart_os_health_check_report_title: "Smart OS Health Check Test Dashboard"
    smart_os_health_check_slack_message_header: "Standard Maintenance Summary"
    smart_os_health_check_slack_message_footer: "Generated by Ansible"
    smart_os_health_check_slack_include_host_breakdown: true
    smart_os_health_check_notification_message: "{{ lookup('ansible.builtin.template', '../../roles/smart_os_health_check/templates/slack_message.txt.j2') }}"
    smart_os_health_check_summary:
      servers_checked: 1
      auto_fixed_count: 1
      critical_error_count: 0
      snippet: "1 Servers Checked, 1 Auto-Fixed, 0 Critical Errors"
    fixture_smart_os_health_check_result:
      hostname: "localhost"
      ip_address: "127.0.0.1"
      os: "Ubuntu 24.04"
      os_family: "Debian"
      package_manager: "apt"
      log_source: "journald"
      platform_type: "Virtual Machine"
      virtualization_type: "docker"
      uptime: "1d 2h 3m"
      last_reboot: "2026-04-20 12:00"
      running_kernel: "6.8.0-test"
      latest_installed_kernel: "6.8.0-test"
      latest_kernel_updated_at: "2026-04-20 11:30"
      latest_kernel_selected: true
      bootloader_supported: true
      bootloader_default_source: "grubby"
      bootloader_default_entry: "/boot/vmlinuz-6.8.0-test"
      bootloader_default_kernel: "6.8.0-test"
      bootloader_default_status: "resolved"
      bootloader_default_matches_latest: true
      bootloader_validation_message: "Default boot entry selects the latest installed kernel"
      reboot_required: false
      selinux_status: "not-installed"
      apparmor_status: "enabled"
      boot_mount: "/boot"
      boot_free_mb: 512.0
      boot_total_mb: 1024.0
      boot_free_pct: 50.0
      boot_space_status: "Healthy"
      rescue_image_available: true
      rescue_image_paths:
        - "/boot/initramfs-rescue-test.img"
      last_failed_login: "No failed login attempts found"
      failed_login_count: 0
      kernel_install_failures: 0
      kernel_install_failure_excerpt: []
      ram_status: "OK"
      ram_used_pct: 43.2
      ram_used_mb: 3456.0
      ram_total_mb: 8192.0
      log_errors: 0
      log_excerpt: []
      services_healed:
        - "chronyd.service"
      healing_results:
        - service: "chronyd.service"
          result: "Fixed"
      final_status: "Pass"
      findings: []
  tasks:
    - name: Ensure temporary test output directory exists
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: "0755"

    - name: Populate host-scoped health result fixture
      ansible.builtin.set_fact:
        smart_os_health_check_result: "{{ fixture_smart_os_health_check_result }}"

    - name: Render HTML dashboard fixture
      ansible.builtin.template:
        src: "../../roles/smart_os_health_check/templates/report.html.j2"
        dest: "{{ output_dir }}/report.html"
        mode: "0644"

    - name: Render Slack message fixture
      ansible.builtin.template:
        src: "../../roles/smart_os_health_check/templates/slack_message.txt.j2"
        dest: "{{ output_dir }}/slack.txt"
        mode: "0644"

    - name: Render generic webhook payload fixture
      ansible.builtin.template:
        src: "../../roles/smart_os_health_check/templates/generic_webhook_payload.json.j2"
        dest: "{{ output_dir }}/generic_webhook.json"
        mode: "0644"
