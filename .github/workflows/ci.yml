name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ANSIBLE_LOCAL_TEMP: .ansible/tmp
      ANSIBLE_REMOTE_TEMP: .ansible/tmp
      ANSIBLE_HOME: .ansible
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run playbook syntax check
        run: ansible-playbook -i inventory/hosts.ini smart_os_health_check.yml --syntax-check

      - name: Run ansible-lint
        run: ansible-lint smart_os_health_check.yml

      - name: Run pytest template checks
        run: pytest -q
