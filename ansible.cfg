[defaults]
roles_path = roles
# .dev-collections/ansible_collections/sameeralam3127/linux_vitals is a
# symlink back to this repo (create it with the two commands in the
# README's Installation section) so FQCN roles like
# sameeralam3127.linux_vitals.vitals_scan resolve during local development
# and CI without depending on a real `ansible-galaxy collection install`
# or on any particular ANSIBLE_HOME/collections_path already set in the
# shell -- both would otherwise silently shadow this explicit path.
collections_path = .dev-collections:~/.ansible/collections:/usr/share/ansible/collections
host_key_checking = True
ssh_args = -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes
interpreter_python = auto
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .facts
local_tmp = .ansible/tmp
